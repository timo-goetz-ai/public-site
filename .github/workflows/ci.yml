name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        # Use `npm install` so the build works even on branches whose
        # package-lock.json is out of sync with package.json (e.g. when
        # dependencies get added in a PR). Main should keep the lock
        # committed.
        run: |
          if [ -f package-lock.json ]; then
            npm ci || npm install
          else
            npm install
          fi

      # Provide safe dummy env vars so the hybrid build does not crash at
      # import time. Real values are injected at runtime on Coolify/Hetzner.
      - name: Build
        env:
          PUBLIC_SUPABASE_URL: https://example.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-key
          API_INGEST_KEY: ci-dummy-key
          API_ALLOWED_ORIGINS: '*'
          TRUSTED_CIDRS: 127.0.0.0/8,::1/128
          PUBLIC_GOOGLE_FORM_URL: https://docs.google.com/forms/d/e/ci/viewform
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
