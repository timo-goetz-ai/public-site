name: Build & Push — Landing Page

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: timo-goetz-ai
  IMAGE: public-site

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ env.OWNER }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via Coolify
        continue-on-error: true
        env:
          COOLIFY_URL:              ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN:            ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_PUBLIC_SITE_UUID: ${{ secrets.COOLIFY_PUBLIC_SITE_UUID }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 -X POST "${COOLIFY_URL}/api/v1/deploy" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"uuid\": \"${COOLIFY_PUBLIC_SITE_UUID}\", \"force\": true}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Coolify: HTTP $HTTP_CODE"
          [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "201" ]] && echo "✅ Deploy ausgelöst" || echo "⚠️ Deploy Timeout — Image trotzdem gepusht"
